<div class="page-hero">
  <span class="page-tag">Your Body · Recovery · Healing</span>
  <h1 class="page-title">Your Physical Recovery<br><em>What to Expect & How to Heal</em></h1>
  <p class="page-intro">Your body has been through something extraordinary — a life-threatening emergency, major surgery, and a profound hormonal shift, all at once. This guide covers what to expect week by week, the warning signs to watch for, and how to advocate for yourself with your medical team.</p>
</div>

<div class="content-wrap">
  <div class="section-block">
    <h2>What Just Happened to Your Body</h2>
    <p>An ectopic rupture is a major abdominal emergency. When the fallopian tube ruptures, it causes significant internal bleeding — you weren't just sick. You were in a life-threatening situation, and your body fought hard to survive it. Most ruptures are treated with emergency laparoscopic (keyhole) surgery, though some require open surgery (laparotomy) depending on the extent of bleeding and your surgeon's ability to work safely.</p>
    <p>During surgery, the affected fallopian tube was either removed entirely (salpingectomy) or in some cases repaired (salpingotomy). If you lost significant blood, you may have received a transfusion. Your body has been through something real and enormous — and healing from it takes time.</p>
    <div class="info-card">
      <div class="info-card-title">Laparoscopy vs. Laparotomy — what's the difference?</div>
      <p>Laparoscopy (keyhole surgery) uses small incisions and a camera — typical recovery is 2–4 weeks. Laparotomy (open surgery) involves a larger incision and is used in emergencies with heavy bleeding — recovery takes closer to 4–6 weeks. If you had open surgery, please be especially patient with yourself.</p>
    </div>
  </div>

  <div class="section-block">
    <h2>Week by Week: What to Expect</h2>
    <h3>Days 1–7: The acute phase</h3>
    <ul>
      <li>Significant pain around your incision sites and lower abdomen — take your prescribed pain medication, don't try to tough it out</li>
      <li>Shoulder tip pain from gas used during laparoscopy — this is very common and will resolve on its own, usually within a few days</li>
      <li>Bloating and difficulty with bowel movements — walk gently, stay hydrated, eat soft foods</li>
      <li>Extreme fatigue — your body is in repair mode. Sleep as much as you need to</li>
      <li>Vaginal bleeding, similar to a period, that may last up to 2 weeks</li>
      <li>Emotional tearfulness — partly hormonal, completely valid</li>
    </ul>
    <h3>Weeks 2–4: Early recovery</h3>
    <ul>
      <li>Pain should be gradually decreasing, but expect good days and harder days — this is normal</li>
      <li>Most women with keyhole surgery can begin returning to light activities and short walks</li>
      <li>Avoid lifting anything heavier than a light bag</li>
      <li>You may still feel emotional and depleted — hormones are dropping and your body is still healing internally</li>
      <li>Your surgeon will want to monitor your hCG levels to confirm they are dropping to zero</li>
    </ul>
    <h3>Weeks 4–6: Rebuilding</h3>
    <ul>
      <li>Most people are cleared for general daily activities within 4–6 weeks from a physical standpoint</li>
      <li>Swimming is often safe once wounds have healed — ask your surgeon before returning to exercise</li>
      <li>Running, intense gym work, and heavy lifting should wait until you have a specific green light from your doctor</li>
      <li>If you had open surgery, this entire timeline extends — give yourself more time, not less</li>
    </ul>
    <div class="warm-callout">
      <p>"Rest is not laziness. In those early weeks, rest is your most important medicine. You just survived emergency surgery. Give yourself full permission to do nothing but heal."</p>
    </div>
  </div>

  <div class="section-block">
    <h2>Hormonal Changes After a Rupture</h2>
    <p>Your hCG (pregnancy hormone) levels drop sharply after an ectopic pregnancy ends — similar to what happens after any pregnancy loss, but often more abrupt. This hormonal shift is real and can cause:</p>
    <ul>
      <li>Significant mood changes and emotional sensitivity — this is biology, not weakness</li>
      <li>Disrupted sleep patterns, vivid dreams, or insomnia</li>
      <li>Hair shedding, often beginning 2–3 months after the event (called telogen effluvium — it is temporary)</li>
      <li>Skin changes, breast tenderness, or bloating</li>
      <li>Your first period may arrive 4–8 weeks after surgery and may be heavier or different than usual — this is normal</li>
    </ul>
    <p>These symptoms are temporary. But if they feel overwhelming, speak to your OB or GP about support options — they can help.</p>
  </div>

  <div class="section-block">
    <h2>Warning Signs: When to Seek Immediate Help</h2>
    <div class="warning-box">
      <div class="warning-title">⚠ Call your doctor or go to the ER right away if you experience:</div>
      <ul>
        <li>Increasing rather than decreasing pain, especially on one side of your pelvis</li>
        <li>Fever above 38°C / 100.4°F</li>
        <li>Heavy bright red bleeding — soaking more than one pad per hour for two hours</li>
        <li>Signs of infection at incision sites: redness, warmth, pus, or swelling</li>
        <li>Dizziness, fainting, or a sudden feeling that something is very wrong</li>
        <li>Severe shoulder pain (can indicate internal bleeding from residual fluid)</li>
      </ul>
    </div>
    <p>You know your body. If something feels wrong, it is always the right call to seek help. You do not need to minimize or second-guess yourself with a medical team after what you've been through.</p>
  </div>

  <div class="section-block">
    <h2>Advocating for Yourself at Follow-Up Appointments</h2>
    <p>After a traumatic emergency, medical settings can feel intimidating. Write down questions before appointments so you don't lose them in the moment. Here are things you are fully entitled to ask:</p>
    <ul>
      <li>"What was done during my surgery, and what should I expect during recovery?"</li>
      <li>"When will my hCG levels be monitored, and what does the target look like?"</li>
      <li>"What are the specific warning signs I should watch for at home?"</li>
      <li>"When can I return to work / exercise / sex / driving?"</li>
      <li>"What does this mean for my future fertility, and when can we have that conversation?"</li>
      <li>"I'm struggling emotionally — can you refer me to a counselor who specializes in pregnancy loss?"</li>
    </ul>
    <div class="warm-callout">
      <p>"You are not a burden for asking questions. You are a patient who just survived something life-threatening. You deserve to be fully informed about your own body and recovery."</p>
    </div>
  </div>
