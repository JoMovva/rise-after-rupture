  <h1 class="page-title">Returning to Work<br><em>After Rupture</em></h1>
  <p class="page-intro">Going back to work after a rupture can feel impossibly heavy. You may look the same on the outside while carrying something enormous inside. This page covers your legal rights, how to navigate your employer, and guidance for women on H-1B visas — because your immigration status should not add to your burden.</p>
</div>

<div class="content-wrap">
  <div class="section-block">
    <h2>The Reality Nobody Prepares You For</h2>
    <p>Going back to work after a rupture is one of the things survivors describe as unexpectedly hard. You may look the same on the outside — but you are carrying something enormous inside. Colleagues will ask how you are, and you'll say "fine," and that will feel like a lie. You'll smile through meetings while still bleeding, still grieving, still wondering what your body is capable of.</p>
    <p>This page is here to help you understand what you're entitled to, how to navigate the conversation with your employer, and how to be genuinely kind to yourself in those first weeks back.</p>
  </div>

  <div class="section-block">
    <h2>Your Rights Under US Law</h2>
    <h3>FMLA — Family and Medical Leave Act</h3>
    <p>If you work for an employer with 50 or more employees and have worked there for at least 12 months (and worked at least 1,250 hours in the past year), you are entitled to up to 12 weeks of unpaid, job-protected leave for a serious health condition. An ectopic rupture and emergency surgery absolutely qualifies.</p>
    <ul>
      <li>Your job — or an equivalent position — must be held for you</li>
      <li>Your employer cannot retaliate against you for taking FMLA leave</li>
      <li>You do not need to share detailed medical information — you only need to indicate a serious health condition</li>
    </ul>
    <h3>Short-Term Disability Insurance</h3>
    <p>If you have short-term disability coverage through your employer, an ectopic rupture and surgical recovery typically qualifies. Contact HR to understand your policy — many plans will provide partial pay during your recovery period.</p>
    <h3>ADA — Americans with Disabilities Act</h3>
    <p>If you are experiencing significant ongoing mental health effects — PTSD, anxiety, or depression — as a result of your rupture, you may be entitled to reasonable workplace accommodations under the ADA. This could include remote work, modified hours, or adjusted responsibilities during your recovery.</p>
    <div class="info-card">
      <div class="info-card-title">Document everything</div>
      <p>Keep copies of all medical notes, leave approval letters, and communications with HR. You should not need to share the details of your surgery — confirming a "serious health condition requiring emergency surgery" is sufficient for FMLA purposes.</p>
    </div>
  </div>

  <div class="section-block">
    <h2>What to Say to Your Employer</h2>
    <p>You are not obligated to say "ectopic pregnancy" or "pregnancy loss." You can say:</p>
    <div class="warm-callout">
      <p>"I recently had a medical emergency that required emergency abdominal surgery. My doctor has advised [X weeks] of recovery. I'd like to discuss applying for FMLA or short-term disability leave."</p>
    </div>
    <p>That is medically accurate and completely sufficient. What happened to your body was serious — you don't owe anyone the details.</p>
    <h3>If you need to return before you feel ready</h3>
    <ul>
      <li>Ask about a phased return — starting part-time or with reduced responsibilities</li>
      <li>Request permission to work from home during your initial transition back</li>
      <li>Identify one trusted colleague who can be a quiet support person</li>
      <li>Give yourself explicit permission to leave early or take a long lunch if you need it</li>
      <li>Know that your productivity may be lower for weeks, and that is both expected and okay</li>
    </ul>
  </div>

  <div class="section-block">
    <h2>Special Guidance for Women on H-1B Visas</h2>
    <p>If you are in the US on an H-1B or other work visa, you may have added fears about taking leave and its effect on your immigration status. Here is what multiple immigration law sources confirm:</p>
    <ul>
      <li><strong>H-1B holders have the same FMLA rights as all other US workers</strong> — this is established law. Your employer must grant you the same considerations as any other employee in your role</li>
      <li><strong>FMLA leave does not terminate your H-1B status</strong> — USCIS has confirmed that H-1B workers on approved leaves of absence continue to maintain lawful status</li>
      <li><strong>Document your leave carefully</strong> — an employer letter stating you remain an employee but are on approved leave is strong documentation. Keep copies of all medical records and HR approvals</li>
      <li><strong>The employer-employee relationship continues</strong> — as long as your employer considers you an active employee on leave, your status is not affected</li>
    </ul>
    <div class="warning-box">
      <div class="warning-title">Important: consult an immigration attorney for your specific situation</div>
      <p>Immigration law is fact-specific. For extended leave beyond FMLA, or if your employer is treating your leave differently, consult an immigration attorney. Many offer free 30-minute consultations, and this is worth the time and cost for peace of mind.</p>
    </div>
  </div>

  <div class="section-block">
    <h2>The Emotional Reality of Being Back</h2>
    <p>Triggers can appear without warning — a colleague's pregnancy announcement, a baby shower invitation forwarded to the group, a meeting where someone says "we need to talk about capacity." You are carrying something invisible while the world moves at its normal pace. This is the survivor tax.</p>
    <ul>
      <li>Build in recovery moments — a walk at lunch, a quiet bathroom break, five minutes of breathing before a hard meeting</li>
      <li>It is okay to say "I'm not available to discuss that right now" without explaining why</li>
      <li>Some days you will feel strong. Some days something small will undo you. Both days are part of the same healing</li>
    </ul>
    <div class="warm-callout">
      <p>"You are showing up. That takes more strength than most people around you realize. Be proud of yourself for every day you manage to be present — even imperfectly, even quietly, even with tears in the bathroom on Tuesday."</p>
    </div>
  </div>
